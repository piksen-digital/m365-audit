<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M365 Retirement Audit</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --font-sans: system-ui, -apple-system, sans-serif;
        --font-mono: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
        --font-serif: Georgia, serif;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f4;
        --color-background-tertiary: #efede8;
        --color-background-info: #e6f1fb;
        --color-background-danger: #fcebeb;
        --color-background-success: #e1f5ee;
        --color-background-warning: #faeeda;
        --color-text-primary: #1a1a18;
        --color-text-secondary: #5f5e5a;
        --color-text-tertiary: #888780;
        --color-text-info: #0c447c;
        --color-text-danger: #791f1f;
        --color-text-success: #085041;
        --color-text-warning: #633806;
        --color-border-tertiary: rgba(0,0,0,0.12);
        --color-border-secondary: rgba(0,0,0,0.25);
        --color-border-primary: rgba(0,0,0,0.35);
        --color-border-info: #85b7eb;
        --color-border-danger: #f09595;
        --color-border-success: #5dcaa5;
        --color-border-warning: #ef9f27;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --border-radius-xl: 16px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1a1a18;
          --color-background-secondary: #242422;
          --color-background-tertiary: #2c2c2a;
          --color-background-info: #042c53;
          --color-background-danger: #501313;
          --color-background-success: #04342c;
          --color-background-warning: #412402;
          --color-text-primary: #e8e6e0;
          --color-text-secondary: #9c9a92;
          --color-text-tertiary: #6b6964;
          --color-text-info: #85b7eb;
          --color-text-danger: #f09595;
          --color-text-success: #5dcaa5;
          --color-text-warning: #fac775;
          --color-border-tertiary: rgba(255,255,255,0.1);
          --color-border-secondary: rgba(255,255,255,0.2);
          --color-border-primary: rgba(255,255,255,0.3);
          --color-border-info: #185fa5;
          --color-border-danger: #a32d2d;
          --color-border-success: #0f6e56;
          --color-border-warning: #854f0b;
        }
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        line-height: 1.5;
        max-width: 900px;
        margin: 0 auto;
        padding: 1.5rem 1.25rem;
      }
      button { font-family: var(--font-sans); transition: opacity .15s, background .15s; }
      button:hover { opacity: .85; }
      input, select { font-family: var(--font-sans); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
